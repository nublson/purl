name: Release

on:
  workflow_dispatch:

jobs:
  merge-develop:
    name: Merge develop into main
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch latest changes
        run: |
          git fetch origin main
          git fetch origin develop

      - name: Checkout main branch
        run: git checkout main

      - name: Merge develop into main
        run: |
          git merge origin/develop --no-edit
        env:
          GIT_MERGE_AUTOEDIT: no

      - name: Push merge to main
        run: git push origin main

  validate-build:
    name: Build Validation
    runs-on: ubuntu-latest
    needs: merge-develop
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy?schema=public"
          BETTER_AUTH_SECRET: "ci-build-placeholder-min-32-chars-do-not-use"
          BETTER_AUTH_URL: "http://localhost:3000"
          RESEND_API_KEY: "ci-placeholder"

      - name: Publish deploy gate status for Vercel
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA=$(git rev-parse HEAD)
          if [ "${{ job.status }}" = "success" ]; then
            STATE=success
          else
            STATE=failure
          fi
          gh api --method POST "repos/${{ github.repository }}/statuses/${SHA}" \
            -f "state=${STATE}" \
            -f context="release/build-validation" \
            -f description="Release workflow Build Validation"
