name: Publish to MCP Registry

# Publishes server.json to the official MCP Registry (registry.modelcontextprotocol.io).
# Auth uses GitHub OIDC — no secrets required. The `io.github.nublson/*` namespace is
# authorized because this workflow runs in a repo owned by `nublson`.
#
# The remote server URL (https://purl.so/api/mcp) MUST be live before publishing, so tag
# a release only AFTER the production deploy is out.

on:
  push:
    tags: ["v*"] # e.g. git tag v0.1.0 && git push origin v0.1.0
  workflow_dispatch: # manual trigger from the Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for OIDC authentication
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      # Keep the published version in sync with the release tag (v0.1.0 -> 0.1.0).
      # The registry rejects re-publishing an existing version, so each release needs a fresh tag.
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          jq --arg v "$VERSION" '.version = $v' server.json > server.tmp && mv server.tmp server.json

      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
